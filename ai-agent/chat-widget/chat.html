<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillerQ AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* ============================================================
           CSS Variables & Reset
           ============================================================ */
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --primary-light: #A29BFE;
            --primary-glow: rgba(108, 92, 231, 0.35);
            --bg-dark: #0F0E17;
            --bg-card: #1A1926;
            --bg-input: #232136;
            --bg-message-user: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 100%);
            --bg-message-bot: #232136;
            --text-primary: #FFFFFE;
            --text-secondary: #94A1B2;
            --text-muted: #72768A;
            --border: rgba(255, 255, 255, 0.06);
            --success: #2CB67D;
            --warning: #FF8906;
            --error: #E53170;
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px var(--primary-glow);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-pill: 24px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ============================================================
           Floating Toggle Button
           ============================================================ */
        #billerq-chat-toggle {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            border: none;
            cursor: pointer;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow), 0 8px 32px rgba(108, 92, 231, 0.4);
            transition: var(--transition);
            animation: pulse-ring 2.5s ease-out infinite;
        }

        #billerq-chat-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px var(--primary-glow), 0 12px 40px rgba(108, 92, 231, 0.5);
        }

        #billerq-chat-toggle:active {
            transform: scale(0.95);
        }

        #billerq-chat-toggle svg {
            width: 28px;
            height: 28px;
            fill: #fff;
            transition: var(--transition);
        }

        #billerq-chat-toggle.open svg.icon-chat {
            display: none;
        }

        #billerq-chat-toggle.open svg.icon-close {
            display: block;
        }

        #billerq-chat-toggle:not(.open) svg.icon-close {
            display: none;
        }

        @keyframes pulse-ring {
            0% { box-shadow: var(--shadow-glow), 0 8px 32px rgba(108, 92, 231, 0.4); }
            50% { box-shadow: 0 0 50px rgba(108, 92, 231, 0.5), 0 8px 32px rgba(108, 92, 231, 0.5); }
            100% { box-shadow: var(--shadow-glow), 0 8px 32px rgba(108, 92, 231, 0.4); }
        }

        /* ============================================================
           Chat Window Container
           ============================================================ */
        #billerq-chat-window {
            position: fixed;
            bottom: 108px;
            right: 28px;
            width: 420px;
            height: 600px;
            max-height: calc(100vh - 140px);
            background: var(--bg-dark);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 99998;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #billerq-chat-window.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        /* ============================================================
           Header
           ============================================================ */
        .chat-header {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.15), rgba(162, 155, 254, 0.08));
            backdrop-filter: blur(20px);
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-title {
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .chat-header-status {
            font-family: var(--font);
            font-size: 12px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            animation: blink 2s ease-in-out infinite;
        }

        .auth-warning {
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            margin: 0 20px 16px;
            background: rgba(229, 102, 102, 0.12);
            color: #ffb3b3;
            border: 1px solid rgba(229, 102, 102, 0.25);
            font-family: var(--font);
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }

        #billerq-chat-toggle:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ============================================================
           Messages Area
           ============================================================ */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: messageIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user .message-bubble {
            background: var(--bg-message-user);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: var(--bg-message-bot);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-family: var(--font);
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 6px;
            text-align: right;
        }

        .message.bot .message-time {
            text-align: left;
        }

        .bot-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 10px;
            align-self: flex-start;
            max-width: 88%;
        }

        .typing-dots {
            padding: 16px 22px;
            border-radius: var(--radius);
            background: var(--bg-message-bot);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 20px;
        }

        .welcome-emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .welcome-title {
            font-family: var(--font);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .welcome-subtitle {
            font-family: var(--font);
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 16px;
            flex-shrink: 0;
        }

        .quick-action-btn {
            padding: 8px 14px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
            background: rgba(108, 92, 231, 0.08);
            color: var(--primary-light);
            font-family: var(--font);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .quick-action-btn:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        /* ============================================================
           Input Area
           ============================================================ */
        .chat-input-area {
            padding: 16px 20px 20px;
            border-top: 1px solid var(--border);
            background: rgba(15, 14, 23, 0.8);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            padding: 6px 8px 6px 16px;
            transition: var(--transition);
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .chat-input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 14px;
            padding: 8px 0;
        }

        .chat-input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: none;
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        /* Microphone Button */
        .mic-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            margin-right: 2px;
        }

        .mic-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .mic-btn.recording {
            background: var(--error);
            animation: mic-pulse 1.5s infinite;
        }

        .mic-btn.recording svg {
            fill: #fff;
        }

        @keyframes mic-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229, 49, 112, 0.6); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(229, 49, 112, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229, 49, 112, 0); }
        }

        .mic-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
        }

        /* Typing Status Text */
        .typing-status {
            font-family: var(--font);
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 10px;
            align-self: center;
        }

        /* Redirect Button CSS */
        .redirect-container {
            margin-top: 10px;
            display: flex;
            justify-content: flex-start;
        }

        .redirect-btn {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.15), rgba(162, 155, 254, 0.15));
            border: 1px solid rgba(108, 92, 231, 0.4);
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
        }

        .redirect-btn:hover {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
            transform: translateY(-1px);
        }

        .redirect-link {
            color: var(--primary-light);
            text-decoration: none;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            display: block;
            width: 100%;
            transition: var(--transition);
        }

        .redirect-btn:hover .redirect-link {
            color: #fff;
        }

        /* ============================================================
           Responsive
           ============================================================ */
        @media (max-width: 480px) {
            #billerq-chat-window {
                bottom: 0;
                right: 0;
                width: 100%;
                height: 100%;
                max-height: 100vh;
                border-radius: 0;
            }

            #billerq-chat-toggle {
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Toggle Button -->
    <button id="billerq-chat-toggle" aria-label="Open AI Assistant">
        <svg class="icon-chat" viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/>
            <circle cx="8" cy="10" r="1.2"/>
            <circle cx="12" cy="10" r="1.2"/>
            <circle cx="16" cy="10" r="1.2"/>
        </svg>
        <svg class="icon-close" viewBox="0 0 24 24">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
    </button>

    <!-- Chat Window -->
    <div id="billerq-chat-window">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-avatar">🤖</div>
            <div class="chat-header-info">
                <div class="chat-header-title">BillerQ AI Assistant</div>
                <div class="chat-header-status">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>
        </div>

        <div class="auth-warning" id="authWarning">
            Sign in through the main BillerQ app first. The assistant becomes available only after successful login.
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <div class="welcome-emoji">👋</div>
                <div class="welcome-title">Hi there!</div>
                <div class="welcome-subtitle">
                    I'm your BillerQ AI assistant. Ask me about customers, payments, subscriptions, or reports.
                </div>
            </div>
        </div>



        <!-- Quick Actions -->
        <div class="quick-actions" id="quickActions">
            <button class="quick-action-btn" data-query="How many active customers?">📊 Active Customers</button>
            <button class="quick-action-btn" data-query="Show recent payments">💰 Recent Payments</button>
            <button class="quick-action-btn" data-query="Who has overdue payments?">⚠️ Overdue</button>
            <button class="quick-action-btn" data-query="Show package report">📦 Package Report</button>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <button class="mic-btn" id="micBtn" type="button" aria-label="Voice input">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                    </svg>
                </button>
                <input
                    type="text"
                    id="chatInput"
                    placeholder="Ask me anything about BillerQ..."
                    autocomplete="off"
                >
                <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ============================================================
        // Configuration
        // ============================================================
        // Default to the local backend started by start_dev.bat (port 8080).
        // If embedding in the parent app set `window.BILLERQ_AI_URL` to the host.
        const API_URL = window.BILLERQ_AI_URL || 'http://127.0.0.1:8080';
        let sessionId = localStorage.getItem('billerq_session_id') || generateId();
        localStorage.setItem('billerq_session_id', sessionId);
        
        let parentToken = '';
        let parentApiUrl = '';
        let parentUserRole = null;

        function getAuthToken() {
            if (parentToken) {
                return parentToken;
            }
            try {
                const loginStr = localStorage.getItem('login');
                if (loginStr) {
                    const keys = ['6Lf2jgMqAAAAACyRDVxBwemO3J5uxCMKyvzIvNbV', 'your-secret-key'];
                    for (const key of keys) {
                        try {
                            const decrypted = CryptoJS.AES.decrypt(loginStr, key).toString(CryptoJS.enc.Utf8);
                            if (decrypted) {
                                const loginData = JSON.parse(decrypted);
                                if (loginData && loginData.userToken) {
                                    return loginData.userToken;
                                }
                            }
                        } catch (_) {
                            // ignore invalid key attempt
                        }
                    }
                }
            } catch (e) {
                console.error('BillerQ AI: Failed to read token from login in localStorage', e);
            }
            return null;
        }

        function getAuthApiUrl() {
            if (parentApiUrl) {
                return parentApiUrl;
            }
            try {
                const profileStr = localStorage.getItem('auth0_profile');
                if (profileStr) {
                    const profileData = JSON.parse(profileStr);
                    if (profileData && profileData.apiUrl) {
                        return profileData.apiUrl;
                    }
                }
            } catch (e) {
                // ignore
            }
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'https://customerapi.billerq.com/api';
            }
            try {
                const ref = document.referrer;
                if (ref) {
                    const origin = new URL(ref).origin;
                    if (origin.includes('admin.billerq.com')) {
                        return 'https://admin.billerq.com/public/api';
                    }
                    if (origin.includes('customer.billerq.com')) {
                        return 'https://customer.billerq.com/public/api';
                    }
                    return origin + '/api';
                }
            } catch (e) {
                // fall through
            }
            return null;
        }

        function getAuthUserRole() {
            if (parentUserRole !== null) {
                return parentUserRole;
            }
            try {
                const loginStr = localStorage.getItem('login');
                if (loginStr) {
                    const keys = ['6Lf2jgMqAAAAACyRDVxBwemO3J5uxCMKyvzIvNbV', 'your-secret-key'];
                    for (const key of keys) {
                        try {
                            const decrypted = CryptoJS.AES.decrypt(loginStr, key).toString(CryptoJS.enc.Utf8);
                            if (decrypted) {
                                const loginData = JSON.parse(decrypted);
                                if (loginData) {
                                    const role = loginData.userType !== undefined ? loginData.userType : loginData.userRole;
                                    if (role !== undefined) return role;
                                }
                            }
                        } catch (_) {
                            // ignore invalid key attempt
                        }
                    }
                }
            } catch (e) {
                console.error('BillerQ AI: Failed to read userRole from login in localStorage', e);
            }
            return null;
        }

        function updateAuthUI() {
            const authWarning = document.getElementById('authWarning');
            const token = getAuthToken();
            const allowed = Boolean(token);
            toggle.disabled = !allowed;
            if (authWarning) {
                authWarning.style.display = allowed ? 'none' : 'block';
            }
            return allowed;
        }

        // Notify parent we are ready to receive auth data
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'widget-ready' }, '*');
        }

        // Listen for token from parent
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'billerq-auth') {
                const profile = event.data.profile;
                if (profile && profile.token) {
                    parentToken = profile.token;
                    parentApiUrl = profile.apiUrl || '';
                    parentUserRole = profile.userRole !== undefined ? profile.userRole : null;
                    console.log('BillerQ AI Widget: Received auth token, API URL and user role from parent');
                    updateAuthUI();
                }
            }
        });

        // ============================================================
        // DOM Elements
        // ============================================================
        const toggle = document.getElementById('billerq-chat-toggle');
        const chatWindow = document.getElementById('billerq-chat-window');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const quickActions = document.getElementById('quickActions');
        const micBtn = document.getElementById('micBtn');

        let isOpen = false;
        let isLoading = false;

        // ============================================================
        // Voice Input Handling (Speech to Text)
        // ============================================================
        if (micBtn) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.lang = 'en-IN'; // Optimized for Indian English accent
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                let isRecording = false;

                micBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (isRecording) {
                        recognition.stop();
                    } else {
                        try {
                            recognition.start();
                        } catch (err) {
                            console.error('Speech recognition failed to start:', err);
                        }
                    }
                });

                recognition.onstart = () => {
                    isRecording = true;
                    micBtn.classList.add('recording');
                    chatInput.placeholder = 'Listening... Speak now';
                };

                recognition.onend = () => {
                    isRecording = false;
                    micBtn.classList.remove('recording');
                    chatInput.placeholder = 'Ask me anything about BillerQ...';
                };

                recognition.onerror = (event) => {
                    console.error('Speech recognition error:', event.error);
                    isRecording = false;
                    micBtn.classList.remove('recording');
                    chatInput.placeholder = 'Ask me anything about BillerQ...';
                };

                recognition.onresult = (event) => {
                    const resultText = event.results[0][0].transcript;
                    if (resultText) {
                        chatInput.value = resultText;
                        sendBtn.disabled = !chatInput.value.trim() || isLoading;
                        chatInput.focus();
                    }
                };
            } else {
                // If browser doesn't support Web Speech API, hide the microphone icon
                micBtn.style.display = 'none';
            }
        }

        // ============================================================
        // Toggle Chat Window
        // ============================================================
        toggle.addEventListener('click', () => {
            if (toggle.disabled) return;
            isOpen = !isOpen;
            toggle.classList.toggle('open', isOpen);
            chatWindow.classList.toggle('visible', isOpen);

            // Notify parent window to resize the iframe container
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'toggle-chat', open: isOpen }, '*');
            }

            if (isOpen) {
                setTimeout(() => chatInput.focus(), 400);
            }
        });

        // ============================================================
        // Input Handling
        // ============================================================
        chatInput.addEventListener('input', () => {
            sendBtn.disabled = !chatInput.value.trim() || isLoading;
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && chatInput.value.trim() && !isLoading) {
                e.preventDefault();
                sendMessage(chatInput.value.trim());
            }
        });

        sendBtn.addEventListener('click', () => {
            if (chatInput.value.trim() && !isLoading) {
                sendMessage(chatInput.value.trim());
            }
        });

        // ============================================================
        // Quick Action Buttons
        // ============================================================
        quickActions.addEventListener('click', (e) => {
            const btn = e.target.closest('.quick-action-btn');
            if (btn && !isLoading) {
                const query = btn.getAttribute('data-query');
                sendMessage(query);
            }
        });

        

        // ============================================================
        // Send Message
        // ============================================================
        async function sendMessage(text) {
            if (isLoading) return;

            // Hide quick actions after first message
            quickActions.style.display = 'none';

            // Add user message
            appendMessage('user', text);
            chatInput.value = '';
            sendBtn.disabled = true;

            // Show typing indicator
            isLoading = true;
            const typingEl = showTypingIndicator();

            try {
                // Resolve token from parent (host app) or from frontend login stored in localStorage
                const userTokenLocal = getAuthToken();
                const userApiUrlLocal = getAuthApiUrl();
                const userRoleLocal = getAuthUserRole();

                if (!userTokenLocal) {
                    appendMessage('bot', 'Please sign in to BillerQ in the main app before using the assistant.');
                    removeTypingIndicator(typingEl);
                    isLoading = false;
                    return;
                }

                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        session_id: sessionId,
                        billerq_token: userTokenLocal,
                        billerq_api_url: userApiUrlLocal,
                        billerq_user_role: userRoleLocal
                    }),
                });

                const data = await response.json();

                // Remove typing indicator
                removeTypingIndicator(typingEl);

                if (data.response) {
                    appendMessage('bot', data.response, data.metadata);
                    // Update session ID if server provides one
                    if (data.session_id) {
                        sessionId = data.session_id;
                        localStorage.setItem('billerq_session_id', sessionId);
                    }
                } else {
                    appendMessage('bot', 'Sorry, I encountered an issue. Please try again.');
                }

            } catch (error) {
                removeTypingIndicator(typingEl);
                console.error('BillerQ AI error:', error);
                appendMessage('bot', 'Unable to connect to the AI assistant. Please check if the server is running.');
            }

            isLoading = false;
        }

        

        // ============================================================
        // Message Rendering
        // ============================================================
        function appendMessage(sender, text, metadata) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (sender === 'bot') {
                messageDiv.innerHTML = `
                    <div class="bot-avatar">🤖</div>
                    <div class="message-content">
                        <div class="message-bubble">${escapeHtml(text)}</div>
                        <div class="message-time">${timeStr}</div>
                    </div>
                `;

                // If the bot provided redirect metadata, render a button/link
                if (metadata && metadata.redirect_url) {
                    try {
                        const resolved = resolveRedirectUrl(metadata.redirect_url);
                        const label = metadata.redirect_label || 'Show more details';
                        const btnContainer = document.createElement('div');
                        btnContainer.className = 'redirect-container';

                        const link = document.createElement('a');
                        link.className = 'redirect-link';
                        link.href = resolved;
                        link.target = '_blank';
                        link.rel = 'noopener';
                        link.textContent = label;

                        const btn = document.createElement('button');
                        btn.className = 'redirect-btn';
                        btn.type = 'button';
                        btn.appendChild(link);

                        // Open in new tab or ask parent to navigate when clicked
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            try {
                                const opened = window.open(resolved, '_blank');
                                if (!opened && window.parent) {
                                    window.parent.postMessage({ type: 'billerq-navigate', url: resolved }, '*');
                                }
                            } catch (err) {
                                if (window.parent) {
                                    window.parent.postMessage({ type: 'billerq-navigate', url: resolved }, '*');
                                }
                            }
                        });

                        // Append the button container under the message bubble
                        const innerDiv = messageDiv.querySelector('.message-content');
                        if (innerDiv) innerDiv.appendChild(btnContainer);
                        btnContainer.appendChild(btn);
                    } catch (err) {
                        console.warn('Failed to render redirect button', err);
                    }
                }
            } else {
                messageDiv.innerHTML = `
                    <div>
                        <div class="message-bubble">${escapeHtml(text)}</div>
                        <div class="message-time">${timeStr}</div>
                    </div>
                `;
            }

            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Resolve a redirect URL to an absolute URL when possible
        function resolveRedirectUrl(url) {
            if (!url) return '';
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            if (window.billerqAppUrl) return window.billerqAppUrl.replace(/\/$/, '') + url;
            try {
                const ref = document.referrer;
                if (ref) {
                    const origin = new URL(ref).origin;
                    return origin + url;
                }
            } catch (e) {
                // fall through
            }
            return url;
        }

        // ============================================================
        // Typing Indicator
        // ============================================================
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="bot-avatar">🤖</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="typing-status" id="typingStatus">Analyzing query...</div>
            `;
            chatMessages.appendChild(typingDiv);
            scrollToBottom();

            // Status steps mapping duration to text
            let elapsed = 0;
            const statusEl = typingDiv.querySelector('#typingStatus');
            const statuses = [
                { time: 0, text: "Analyzing query..." },
                { time: 4, text: "Routing to database handler..." },
                { time: 10, text: "Formulating database request..." },
                { time: 18, text: "Connecting to BillerQ database..." },
                { time: 26, text: "Executing query on BillerQ..." },
                { time: 36, text: "Retrieving records..." },
                { time: 44, text: "Formatting results (using local CPU, please wait)..." },
                { time: 60, text: "Generating summary text..." },
                { time: 80, text: "Almost done (compiling final response)..." },
                { time: 100, text: "Still working, please wait..." }
            ];

            const intervalId = setInterval(() => {
                elapsed += 1;
                const currentStatus = statuses.reduce((prev, curr) => {
                    return (elapsed >= curr.time) ? curr : prev;
                }, statuses[0]);
                if (statusEl) {
                    statusEl.textContent = currentStatus.text;
                }
            }, 1000);

            typingDiv.dataset.intervalId = intervalId;
            return typingDiv;
        }

        function removeTypingIndicator(el) {
            if (el) {
                if (el.dataset.intervalId) {
                    clearInterval(parseInt(el.dataset.intervalId));
                }
                if (el.parentNode) {
                    el.parentNode.removeChild(el);
                }
            }
        }

        // ============================================================
        // Utilities
        // ============================================================
        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            // Basic escape
            const div = document.createElement('div');
            div.textContent = text;
            let escaped = div.innerHTML;

            // Bold styling: **text** -> <strong>text</strong>
            escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Inline code: `code` -> <code>code</code>
            escaped = escaped.replace(/`(.*?)`/g, '<code style="background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 13px; color: var(--primary-light);">$1</code>');

            // Replace bullet characters/points at the start of a line with styled lists
            escaped = escaped.replace(/(?:^|<br>)\s*•\s+([^<\n]+)/g, (match, content) => {
                return `<br><span style="display: inline-flex; align-items: flex-start; gap: 8px; margin-left: 8px;"><span style="color: var(--primary-light);">•</span><span>${content}</span></span>`;
            });

            // Convert raw newlines to break tags
            return escaped.replace(/\n/g, '<br>');
        }

        function generateId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

    })();
    </script>
</body>
